apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
  namespace: nvidia
spec:
  interval: 5m
  upgrade:
    force: true
  chart:
    spec:
      chart: gpu-operator
      version: v26.3.2
      sourceRef:
        kind: HelmRepository
        name: nvidia-gpu-cloud
        namespace: flux-system
      interval: 5m
  values:
    runtimeClassName: nvidia
    cdi:
      enabled: true
    dcgmExporter:
      enabled: false
    driver:
      enabled: false
    nfd:
      enabled: true
    toolkit:
      enabled: false
    hostPaths:
      driverInstallDir: /usr/local
