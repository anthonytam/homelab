apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fr24-mqtt-bridge
  namespace: smart-home
spec:
  interval: 5m
  upgrade:
    force: true
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  values:
    defaultPodOptions:
      imagePullSecrets:
       - name: ghcr-image-pull-secret
    controllers:
      app:
        containers:
          app:
            image:
              repository: ghcr.io/anthonytam/fr24-mqtt-bridge
              tag: latest
            env:
              FR24_URL: "http://rtlsdr.local.tam.land:8754/monitor.json"
              MQTT_HOST: "mosquitto.smart-home.svc.cluster.local"
              MQTT_PORT: "1883"
              MQTT_USER: ""
              MQTT_PASS: ""
              POLL_INTERVAL: "15"
              DISCOVERY_PREFIX: "homeassistant"