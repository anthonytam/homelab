apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: other-webapps
spec:
  interval: 5m
  upgrade:
    force: true
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  values:
    controllers:
      app:
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5
            envFrom: &envFrom
              - secret: immich-configuration
      machine-learning:
        containers:
          machine-learning:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.5
            envFrom: *envFrom
      machine-learning-cuda:
        containers:
          machine-learning-cuda:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.5-cuda
            env:
              NVIDIA_VISIBLE_DEVICES: all
            envFrom: *envFrom
            pod:
              runtimeClassName: nvidia
              nodeSelector:
                "tam.land/gpu.present": "true"
              tolerations:
                - key: "tam.land/peripheralNode"
                  operator: "Equal"
                  value: "true"
                  effect: "NoSchedule"
      postgres:
        containers:
          postgres:
            image:
              repository: ghcr.io/immich-app/postgres
              tag: 16-vectorchord0.4.3-pgvectors0.2.0
            envFrom:
              - secret: immich-postgres-configuration
            env:
              DB_STORAGE_TYPE: HDD
      redis:
        containers:
          redis:
            image:
              repository: redis
              tag: 8.6.2
    service:
      app:
        enabled: true
        controller: app
        primary: true
        ports:
          http:
            port: 2283
      machine-learning:
        enabled: true
        controller: machine-learning
        ports:
          http:
            port: 3003
      machine-learning-cuda:
        enabled: true
        controller: machine-learning-cuda
        ports:
          http:
            port: 3003
      postgres:
        enabled: true
        controller: postgres
        ports:
          http:
            port: 5432
      redis:
        enabled: true
        controller: redis
        ports:
          http:
            port: 6379
    ingress:
      app:
        enabled: true
        hosts:
          - host: photos.tam.land
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
        tls:
          - secretName: tamland-tls
            hosts:
              - photos.tam.land

    persistence:
      data:
        enabled: true
        type: nfs
        server: truenas.local.tam.land
        path: /mnt/main-bay/k8s-data/immich/data
        advancedMounts:
          app:
            app:
              - path: /usr/src/app/upload
                readOnly: false
      icbm-1-pictures:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: icbm-1-pictures
        advancedMounts:
          app:
            app:
              - path: /icbm-1-pictures
                readOnly: true
      icbm-1-phone-pictures:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: icbm-1-phone-pictures
        advancedMounts:
          app:
            app:
              - path: /icbm-1-phone-pictures
                readOnly: false
      pgdata:
        enabled: true
        type: nfs
        server: nfs.local.tam.land
        path: /nfs-share/other-webapps/immich/postgres
        advancedMounts:
          postgres:
            postgres:
              - path: /var/lib/postgresql/data
                readOnly: false
