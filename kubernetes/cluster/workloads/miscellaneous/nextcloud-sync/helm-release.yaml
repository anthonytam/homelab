apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-sync
  namespace: miscellaneous
spec:
  interval: 5m
  upgrade:
    force: true
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  values:
    defaultPodOptions:
      imagePullSecrets:
       - name: ghcr-image-pull-secret
    controllers:
      dmc:
        enabled: true
        containers:
          dmc:
            image:
              repository: ghcr.io/anthonytam/nextcloud-sync
              tag: "20260421"
            envFrom:
              - secret: nextcloud-sync-configuration
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    persistence:
      dmc:
        enabled: true
        type: nfs
        server: truenas.local.tam.land
        path: /mnt/main-bay/k8s-data/miscellaneous/nextcloud-sync/dmc
        advancedMounts:
          dmc:
            dmc:
              - path: /nextcloud-data
