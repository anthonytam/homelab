apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
  namespace: openclaw
spec:
  interval: 5m
  upgrade:
    force: true
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  values:
    controllers:
      app:
        enabled: true
        containers:
          app:
            image:
              repository: openclaw/openclaw
              tag: 2026.5.20
            envFrom:
              - secret: openclaw-configuration
    service:
      app:
        enabled: true
        controller: app
        primary: true
        ports:
          http:
            port: 18789
    ingress:
      app:
        enabled: true
        hosts:
          - host: openclaw.local.tam.land
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
        tls:
          - secretName: local-tamland-tls
            hosts:
              - openclaw.local.tam.land
    persistence:
      workspace:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: workspace
        advancedMounts:
          app:
            app:
              - path: /workspace
      sessions:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: sessions
        advancedMounts:
          app:
            app:
              - path: /sessions

