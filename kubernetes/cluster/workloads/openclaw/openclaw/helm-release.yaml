apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
  namespace: openclaw
spec:
  interval: 5m
  upgrade:
    force: true
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  values:
    controllers:
      app:
        enabled: true
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.6.5
            envFrom:
              - secret: openclaw-configuration
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
    service:
      app:
        enabled: true
        controller: app
        primary: true
        ports:
          http:
            port: 18789
    ingress:
      app:
        enabled: true
        hosts:
          - host: openclaw.local.tam.land
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
        tls:
          - secretName: local-tamland-tls
            hosts:
              - openclaw.local.tam.land
    persistence:
      gateway-config:
        enabled: true
        type: nfs
        server: nfs.local.tam.land
        path: /nfs-share/openclaw/openclaw/config
        advancedMounts:
          app:
            app:
              - path: /home/node/.openclaw
                readOnly: false
      workspace:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: workspace
        advancedMounts:
          app:
            app:
              - path: /workspace
      sessions:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: sessions
        advancedMounts:
          app:
            app:
              - path: /sessions

