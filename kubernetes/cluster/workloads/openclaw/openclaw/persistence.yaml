apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workspace
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: proxmox-data-ssd-array
  resources:
    requests:
      storage: 25Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sessions
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: proxmox-data-ssd-array
  resources:
    requests:
      storage: 10Gi